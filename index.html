const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];
const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
// 2026: Jan 1 = Thursday (day index 4)
const JAN1_DOW = 4;

let visited = JSON.parse(localStorage.getItem('twt-visited') || '{}');
let currentDay = null;
let currentCrossRef = null;

function dayOfYear(month, dayOfMonth) {
  let d = 0;
  for (let m = 0; m < month; m++) d += DAYS_IN_MONTH[m];
  return d + dayOfMonth;
}

function monthDayFromDoy(doy) {
  let d = doy;
  for (let m = 0; m < 12; m++) {
    if (d <= DAYS_IN_MONTH[m]) return [m, d];
    d -= DAYS_IN_MONTH[m];
  }
  return [11, 31];
}

function updateStats() {
  const count = Object.keys(visited).length;
  document.getElementById('visited-count').textContent = count;
  const pct = Math.round(count / 365 * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
}

function saveVisited() {
  localStorage.setItem('twt-visited', JSON.stringify(visited));
  updateStats();
}

function resetVisited() {
  if (confirm('Reset all visited days?')) {
    visited = {};
    saveVisited();
    renderMonth(currentMonthIdx);
  }
}

// Today
const now = new Date();
const todayMonth = now.getMonth();
const todayDate = now.getDate();
let currentMonthIdx = todayMonth;

function renderMonthNav() {
  const nav = document.getElementById('month-nav');
  MONTHS.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === currentMonthIdx ? ' active' : '');
    btn.textContent = m.substring(0, 3);
    btn.onclick = () => {
      currentMonthIdx = i;
      document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMonth(i);
    };
    nav.appendChild(btn);
  });
}

function renderMonth(monthIdx) {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  const title = document.createElement('div');
  title.className = 'month-title';
  title.textContent = MONTHS[monthIdx];
  cal.appendChild(title);

  const wh = document.createElement('div');
  wh.className = 'weekday-header';
  WEEKDAYS.forEach(wd => {
    const d = document.createElement('div');
    d.textContent = wd;
    wh.appendChild(d);
  });
  cal.appendChild(wh);

  const grid = document.createElement('div');
  grid.className = 'days-grid';

  // DOW for 1st of this month
  let doy1 = dayOfYear(monthIdx, 1);
  let dow1 = (JAN1_DOW + doy1 - 1) % 7;

  for (let e = 0; e < dow1; e++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= DAYS_IN_MONTH[monthIdx]; d++) {
    const doy = dayOfYear(monthIdx, d);
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.textContent = d;
    if (visited[doy]) cell.classList.add('visited');
    if (monthIdx === todayMonth && d === todayDate) cell.classList.add('today');
    cell.onclick = () => openDay(doy);
    grid.appendChild(cell);
  }
  cal.appendChild(grid);
}

function openDay(doy) {
  const entry = ALMANAC[doy - 1];
  if (!entry) return;
  currentDay = doy;
  visited[doy] = true;
  saveVisited();
  renderMonth(currentMonthIdx);

  document.getElementById('m-date').textContent = entry.date_label;
  document.getElementById('m-quote').textContent = '"' + entry.quote + '"';
  document.getElementById('m-ep').textContent = entry.episode;
  document.getElementById('m-title').textContent = entry.episode_title;
  document.getElementById('m-cat').textContent = entry.category;
  document.getElementById('m-theme').textContent = entry.theme;
  document.getElementById('m-hashtag').textContent = entry.hashtag;
  document.getElementById('m-mood').textContent = entry.mood;
  document.getElementById('m-context').textContent = entry.context;

  const crossEl = document.getElementById('m-crossref');
  if (entry.cross_ref_episode) {
    currentCrossRef = entry.cross_ref_episode;
    crossEl.textContent = '🔗 See also: Episode ' + entry.cross_ref_episode;
    crossEl.style.display = 'block';
  } else {
    currentCrossRef = null;
    crossEl.style.display = 'none';
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function navDay(delta) {
  let next = currentDay + delta;
  if (next < 1) next = 365;
  if (next > 365) next = 1;
  const [m] = monthDayFromDoy(next);
  if (m !== currentMonthIdx) {
    currentMonthIdx = m;
    document.querySelectorAll('.month-btn').forEach((b, i) => b.classList.toggle('active', i === m));
    renderMonth(m);
  }
  openDay(next);
}

function jumpCrossRef() {
  if (!currentCrossRef) return;
  // Find the day that uses this episode
  const idx = ALMANAC.findIndex(e => e.episode === currentCrossRef);
  if (idx >= 0) {
    const doy = idx + 1;
    const [m] = monthDayFromDoy(doy);
    if (m !== currentMonthIdx) {
      currentMonthIdx = m;
      document.querySelectorAll('.month-btn').forEach((b, i) => b.classList.toggle('active', i === m));
      renderMonth(m);
    }
    openDay(doy);
  }
}

document.getElementById('modal-overlay').onclick = (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
};
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('modal-overlay').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navDay(-1);
  if (e.key === 'ArrowRight') navDay(1);
});

renderMonthNav();
renderMonth(currentMonthIdx);
updateStats();
</script>
</body>
</html>
